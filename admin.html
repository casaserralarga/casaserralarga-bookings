<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Casa Serralarga</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Casa Serralarga - Admin Dashboard</h1>
            <nav>
                <a href="#boekingen">Boekingen</a>
                <a href="#kamers">Kamers</a>
                <a href="#prijzen">Prijzen</a>
            </nav>
        </header>

        <section id="boekingen">
            <h2>Alle Boekingen</h2>
            <table id="bookings-table">
                <thead>
                    <tr>
                        <th>Gastnaam</th>
                        <th>Kamer</th>
                        <th>Aankomst</th>
                        <th>Vertrek</th>
                        <th>Status</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="bookings-body"></tbody>
            </table>
        </section>

        <section id="kamers">
            <h2>Kamer Beheer</h2>
            <div class="room-grid" id="rooms-grid"></div>
        </section>

        <section id="prijzen">
            <h2>Prijzen Instellen</h2>
            <form id="pricing-form">
                <label for="price-date">Datum:</label>
                <input type="date" id="price-date" required>
                
                <label for="price-amount">Prijs per Nacht (€):</label>
                <input type="number" id="price-amount" step="0.01" required>
                
                <button type="submit">Opslaan</button>
            </form>
        </section>
    </div>

    <script src="admin.js"></script>
</body>
</html>

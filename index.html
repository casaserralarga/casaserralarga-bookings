<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gast Boeking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Boek Uw Verblijf</h1>
        <form id="booking-form">
            <label for="check-in">Aankomstdatum:</label>
            <input type="date" id="check-in" name="checkin" required>
            
            <label for="check-out">Vertrekdatum:</label>
            <input type="date" id="check-out" name="checkout" required>
            
            <label for="room-type">Kamer Type:</label>
            <select id="room-type" name="roomtype" required>
                <option value="single">Eenpersoonskamer</option>
                <option value="double">Tweepersoonskamer</option>
                <option value="suite">Suite</option>
            </select>
            
            <button type="button" id="check-availability">Controleer Beschikbaarheid</button>
        </form>
        
        <div id="result" class="hidden">
            <h2>Prijs Berekening</h2>
            <p id="price"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
